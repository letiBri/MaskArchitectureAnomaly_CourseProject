trainer:
  max_epochs: 50 # Solitamente meno epoche rispetto al training da zero
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "cityscapes_semantic_finetuned_from_coco"

model:
  # Usiamo la classe Semantic come nel tuo secondo file
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    # Manteniamo l'annealing attivo, ma i passi vanno ricalcolati 
    # in base al nuovo numero di iterazioni del fine-tuning
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [1000, 3000, 5000]
    attn_mask_annealing_end_steps: [2000, 4000, 6000]
    
    network:
      class_path: models.eomt.EoMT
      init_args:
        # Nota: num_q deve essere coerente con il checkpoint pre-addestrato. 
        # Se il modello COCO aveva 200 query, meglio lasciarne 200 qui.
        num_q: 200 
        num_blocks: 3
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: vit_base_patch14_reg4_dinov2

data:
  # Dataset di destinazione per il fine-tuning
  class_path: datasets.cityscapes_semantic.CityscapesSemantic